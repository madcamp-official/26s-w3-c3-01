<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CueCast Local Test</title>
  <style>
    :root { color-scheme: dark; --bg:#111418; --panel:#1a2027; --line:#34404c; --text:#f2f5f7; --muted:#9aa7b2; --blue:#42a5f5; --yellow:#ffd54f; --red:#ef5350; --cloth:#176b68; --good:#4ade80; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Inter,system-ui,sans-serif; }
    button,input { font:inherit; }
    .app { max-width:1440px; margin:auto; padding:18px; display:grid; gap:14px; }
    .tabs { display:flex; gap:6px; border-bottom:1px solid var(--line); }
    .tabs button { border:0; border-radius:8px 8px 0 0; background:transparent; color:var(--muted); }
    .tabs button[aria-selected="true"] { color:var(--text); background:var(--panel); box-shadow:inset 0 -2px var(--blue); }
    .view { display:grid; gap:14px; }
    [hidden] { display:none!important; }
    .toolbar,.status,.panel,.stat { background:var(--panel); border:1px solid var(--line); border-radius:12px; }
    .toolbar { padding:12px; display:flex; gap:10px; align-items:end; flex-wrap:wrap; }
    label { display:grid; gap:6px; flex:1 1 460px; color:var(--muted); font-size:13px; }
    input { width:100%; padding:10px 12px; color:var(--text); background:var(--bg); border:1px solid var(--line); border-radius:8px; }
    button { padding:10px 14px; color:var(--text); background:#27313a; border:1px solid var(--line); border-radius:8px; cursor:pointer; }
    button.primary,button.active { background:var(--blue); color:#06101a; border-color:transparent; font-weight:600; }
    .status { padding:9px 12px; display:flex; gap:9px; align-items:center; color:var(--muted); }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); }
    .dot.connected { background:var(--good); }
    .main { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .panel { padding:12px; display:grid; gap:10px; min-width:0; }
    .heading { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    h2 { margin:0; font-size:16px; }
    .badge { padding:5px 9px; border-radius:999px; background:#26313a; color:var(--muted); font-size:12px; }
    .player { position:relative; aspect-ratio:16/9; overflow:hidden; border-radius:8px; background:#090b0e; }
    #player,.overlay { position:absolute; inset:0; width:100%; height:100%; border:0; }
    .placeholder { position:absolute; inset:0; display:grid; place-items:center; color:var(--muted); }
    .placeholder.hidden { display:none; }
    .table { width:100%; aspect-ratio:16/9; border:14px solid #38434d; border-radius:12px; background:var(--cloth); position:relative; overflow:hidden; }
    .ball { position:absolute; width:22px; height:22px; margin:-11px; border-radius:50%; border:2px solid #101418; transition:left .18s,top .18s; }
    .ball.white { background:var(--blue); }.ball.yellow { background:var(--yellow); }.ball.red { background:var(--red); }
    .ball.cue::after { content:"CUE"; position:absolute; left:24px; top:-3px; color:var(--text); font-size:11px; font-weight:700; }
    .cue-controls { display:flex; gap:7px; align-items:center; color:var(--muted); font-size:12px; }
    .cue-controls button { padding:6px 10px; }
    .video-controls { display:grid; gap:8px; }
    .timeline { display:grid; grid-template-columns:auto 1fr auto; gap:9px; align-items:center; color:var(--muted); font-size:12px; }
    .timeline input { padding:0; accent-color:var(--blue); }
    .position-controls { display:grid; grid-template-columns:120px auto 1fr; gap:8px; }
    .position-controls input { text-align:center; }
    button:disabled,input:disabled { opacity:.45; cursor:not-allowed; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .stat { padding:14px; display:grid; gap:5px; }
    .stat span { color:var(--muted); font-size:12px; }.stat strong { font-size:26px; }
    .progress { height:16px; background:#27313a; border-radius:999px; overflow:hidden; }
    .progress span { display:block; height:100%; background:var(--blue); transition:width .2s; }
    .detail { color:var(--muted); font-size:12px; word-break:break-word; }
    .box { fill:none; stroke-width:3; }.box.white { stroke:var(--blue); }.box.yellow { stroke:var(--yellow); }.box.red { stroke:var(--red); }
    .match-layout { display:grid; grid-template-columns:minmax(280px,.7fr) minmax(440px,1.3fr); gap:14px; }
    .match-form { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .match-form label { flex:auto; }
    .match-form .wide { grid-column:1/-1; }
    select { width:100%; padding:10px 12px; color:var(--text); background:var(--bg); border:1px solid var(--line); border-radius:8px; }
    .match-result { align-content:start; gap:18px; }
    .versus { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:18px; text-align:center; }
    .player-face { display:grid; justify-items:center; gap:8px; min-width:0; }
    .avatar { width:76px; height:76px; display:grid; place-items:center; border-radius:50%; background:#26313a; border:2px solid var(--line); font-size:28px; font-weight:500; }
    .player-face.favorite .avatar { border-color:var(--blue); box-shadow:0 0 0 4px color-mix(in srgb,var(--blue) 18%,transparent); }
    .player-face strong { font-size:20px; overflow-wrap:anywhere; }
    .win-value { font-size:34px; font-weight:500; }
    .vs { color:var(--muted); font-weight:500; }
    .odds-bar { display:flex; height:28px; overflow:hidden; border-radius:999px; background:#27313a; }
    .odds-bar span { display:grid; place-items:center; min-width:54px; color:#071018; font-size:12px; font-weight:500; transition:width .25s; }
    .odds-a { background:var(--blue); }.odds-b { background:var(--yellow); }
    .match-summary { text-align:center; display:grid; gap:5px; }
    .match-summary strong { font-size:22px; }
    .model-note { color:var(--muted); font-size:12px; text-align:center; }
    @media(max-width:800px){.main,.stats,.match-layout{grid-template-columns:1fr}.app{padding:10px}.match-form{grid-template-columns:1fr}.match-form .wide{grid-column:auto}.avatar{width:60px;height:60px}.versus{gap:8px}}
  </style>
</head>
<body>
<main class="app">
  <nav class="tabs" role="tablist" aria-label="CueCast 화면">
    <button id="live-tab" role="tab" aria-selected="true" aria-controls="live-view">실시간 샷 분석</button>
    <button id="match-tab" role="tab" aria-selected="false" aria-controls="match-view">경기 전 승부 예측</button>
  </nav>
  <div class="view" id="live-view" role="tabpanel" aria-labelledby="live-tab">
  <section class="toolbar">
    <label>YouTube URL<input id="youtube-url" type="url" placeholder="https://www.youtube.com/watch?v=..."></label>
    <button class="primary" id="connect">영상 연결</button>
    <button id="live-toggle" disabled>자동 분석 대기</button>
    <button id="sample">샘플 검출</button>
  </section>
  <section class="status"><i class="dot" id="dot"></i><strong id="status">엔진 연결 확인 중</strong><span id="status-detail"></span></section>
  <section class="main">
    <article class="panel">
      <div class="heading"><h2>YouTube 영상</h2><span class="badge" id="analysis-state">위치 선택 대기</span></div>
      <div class="player">
        <div id="player"></div>
        <div class="placeholder" id="placeholder">YouTube URL을 입력하세요</div>
        <svg class="overlay" viewBox="0 0 640 360" aria-label="공 검출 오버레이"><g id="boxes"></g></svg>
      </div>
      <div class="video-controls">
        <div class="timeline"><span id="current-time">00:00</span><input id="position-range" type="range" min="0" max="1" value="0" step="0.1" disabled><span id="duration">00:00</span></div>
        <div class="position-controls"><input id="position-text" value="00:00:15" aria-label="분석 위치"><button id="seek" disabled>위치 이동</button><button class="primary" id="analyze" disabled>이 위치의 리플레이 직전 공 분석</button></div>
      </div>
    </article>
    <article class="panel">
      <div class="heading"><h2>버추얼 포메이션</h2><div class="cue-controls">수구 <button class="active" id="white">흰 공</button><button id="yellow">노란 공</button></div></div>
      <div class="table" id="table"><i class="ball white cue"></i><i class="ball yellow"></i><i class="ball red"></i></div>
    </article>
  </section>
  <section class="stats">
    <div class="stat"><span>샷 성공률</span><strong id="probability">--</strong><small id="model">엔진 대기</small></div>
    <div class="stat"><span>난이도</span><strong id="difficulty">--</strong><small>100점 기준</small></div>
    <div class="stat"><span>데이터 신뢰도</span><strong id="confidence">--</strong><small id="records">데이터 확인 중</small></div>
  </section>
  <div class="progress"><span id="bar" style="width:0"></span></div>
  <div class="detail" id="detail">검출 좌표 대기</div>
  </div>
  <div class="view" id="match-view" role="tabpanel" aria-labelledby="match-tab" hidden>
    <section class="match-layout">
      <article class="panel">
        <div class="heading"><h2>경기 정보</h2><span class="badge">경기 시작 전</span></div>
        <div class="match-form">
          <label>선수 A<input id="player-a" value="김가영" autocomplete="off"></label>
          <label>선수 B<input id="player-b" value="스롱 피아비" autocomplete="off"></label>
          <label>선수 A AVG<input id="avg-a" type="number" min="0.1" max="5" step="0.01" value="1.65"></label>
          <label>선수 B AVG<input id="avg-b" type="number" min="0.1" max="5" step="0.01" value="1.45"></label>
          <label class="wide">먼저 이길 세트<select id="sets-to-win"><option value="3">3세트</option><option value="4" selected>4세트</option><option value="5">5세트</option></select></label>
          <button class="primary wide" id="match-predict">승리 확률 계산</button>
        </div>
      </article>
      <article class="panel match-result" aria-live="polite">
        <div class="heading"><h2>승부 예측</h2><span class="badge" id="match-model">초기 추정</span></div>
        <div class="versus">
          <div class="player-face" id="face-a"><span class="avatar" id="avatar-a">김</span><strong id="name-a">김가영</strong><span class="win-value" id="win-a">--</span><small id="set-a">세트 승률 --</small></div>
          <span class="vs">VS</span>
          <div class="player-face" id="face-b"><span class="avatar" id="avatar-b">스</span><strong id="name-b">스롱 피아비</strong><span class="win-value" id="win-b">--</span><small id="set-b">세트 승률 --</small></div>
        </div>
        <div class="odds-bar" role="img" aria-label="두 선수 승리 확률 비교"><span class="odds-a" id="odds-a" style="width:50%">50%</span><span class="odds-b" id="odds-b" style="width:50%">50%</span></div>
        <div class="match-summary"><strong id="favorite">계산 대기</strong><span id="likely-score">예상 스코어 --</span></div>
        <div class="model-note">현재는 선수 AVG와 경기 세트 수만 반영한 초기 추정치입니다. 경기 DB가 쌓이면 상대 전적·최근 폼·테이블 조건을 추가할 수 있습니다.</div>
      </article>
    </section>
  </div>
</main>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const samples=[
    {white:[.5583,.9381],yellow:[.2336,.7072],red:[.9643,.3434]},
    {white:[.9052,.2854],yellow:[.5463,.9336],red:[.964,.3427]},
    {white:[.9057,.2848],yellow:[.9244,.3762],red:[.5551,.8595]}
  ];
  let balls=samples[0],sampleIndex=0,shooter='white',detectionVersion=0,formationRevision=0,ytPlayer=null,ytApiReady=false,isScrubbing=false,liveRunning=false,liveSyncTimer=null;
  const $=id=>document.getElementById(id);
  function showTab(name){const live=name==='live';$('live-view').hidden=!live;$('match-view').hidden=live;$('live-tab').setAttribute('aria-selected',String(live));$('match-tab').setAttribute('aria-selected',String(!live));if(!live)predictMatch()}
  $('live-tab').onclick=()=>showTab('live');$('match-tab').onclick=()=>showTab('match');
  window.onYouTubeIframeAPIReady=()=>{ytApiReady=true};
  function videoId(value){try{const u=new URL(value.trim());if(u.hostname.includes('youtu.be'))return u.pathname.split('/').filter(Boolean)[0];if(u.searchParams.get('v'))return u.searchParams.get('v');const p=u.pathname.split('/').filter(Boolean),i=p.findIndex(x=>['embed','shorts','live'].includes(x));return i>=0?p[i+1]:null}catch{return /^[\w-]{11}$/.test(value.trim())?value.trim():null}}
  function formatTime(seconds){seconds=Math.max(0,Math.round(Number(seconds)||0));const h=Math.floor(seconds/3600),m=Math.floor(seconds%3600/60),s=seconds%60;return h?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
  function parseTime(value){const parts=value.trim().split(':').map(Number);if(parts.some(Number.isNaN)||parts.length<1||parts.length>3)return null;return parts.reduce((total,n)=>total*60+n,0)}
  function syncPlayerTime(){if(!ytPlayer||typeof ytPlayer.getCurrentTime!=='function')return;const duration=ytPlayer.getDuration()||0,current=ytPlayer.getCurrentTime()||0;$('duration').textContent=formatTime(duration);$('position-range').max=Math.max(duration,1);if(!isScrubbing){$('position-range').value=current;$('current-time').textContent=formatTime(current)}}
  async function startLive(seconds){const url=$('youtube-url').value.trim();if(!videoId(url))return;$('live-toggle').disabled=false;$('live-toggle').textContent='자동 연결 중';$('analysis-state').textContent='실시간 연결 중';try{const response=await fetch('/api/v1/youtube/live/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,timestamp_seconds:Number(seconds)||0,shooter})});const data=await response.json();if(!response.ok)throw new Error(data.detail||data.error);liveRunning=true;$('live-toggle').textContent='자동 분석 중지'}catch(error){liveRunning=false;$('live-toggle').textContent='자동 분석 재시작';$('analysis-state').textContent='실시간 연결 실패';$('status-detail').textContent=error.message}}
  function syncLiveTo(seconds){clearTimeout(liveSyncTimer);liveSyncTimer=setTimeout(()=>startLive(seconds),250)}
  async function stopLive(){await fetch('/api/v1/youtube/live/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});liveRunning=false;$('live-toggle').textContent='자동 분석 시작';$('analysis-state').textContent='자동 분석 정지'}
  function renderBalls(){
    document.querySelectorAll('.ball').forEach(el=>{const c=['white','yellow','red'].find(x=>el.classList.contains(x));el.style.left=`${balls[c][0]*100}%`;el.style.top=`${balls[c][1]*100}%`;el.classList.toggle('cue',c===shooter)});
    $('white').classList.toggle('active',shooter==='white');$('yellow').classList.toggle('active',shooter==='yellow');
    const ns='http://www.w3.org/2000/svg',g=$('boxes');g.replaceChildren();
    Object.entries(balls).forEach(([c,p])=>{const r=document.createElementNS(ns,'rect');r.setAttribute('x',134+p[0]*367-11);r.setAttribute('y',73+p[1]*181-11);r.setAttribute('width',22);r.setAttribute('height',22);r.setAttribute('rx',3);r.setAttribute('class',`box ${c}`);g.append(r)});
    $('detail').textContent=`W (${balls.white.map(x=>x.toFixed(3)).join(', ')}) · Y (${balls.yellow.map(x=>x.toFixed(3)).join(', ')}) · R (${balls.red.map(x=>x.toFixed(3)).join(', ')})`;
  }
  function applyPrediction(data){
    const p=data.successProbability*100;$('probability').textContent=`${p.toFixed(1)}%`;$('difficulty').textContent=(100-p).toFixed(1);$('confidence').textContent=data.confidence.level;$('bar').style.width=`${p}%`;$('model').textContent=data.modelVersion;$('records').textContent=`학습 데이터 ${data.dataRecords}건`;$('status').textContent='엔진 연결됨';$('status-detail').textContent=data.flags.join(' · ');$('dot').classList.add('connected');
  }
  async function predict(){
    const revision=formationRevision;
    $('status').textContent='확률 계산 중';
    try{
      const response=await fetch('/api/v1/shot-probability',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shooter,before:balls,position_error_mm:25})});
      const data=await response.json();if(!response.ok)throw new Error(data.detail||data.error);if(revision!==formationRevision)return;
      applyPrediction(data);
    }catch(error){$('status').textContent='엔진 연결 실패';$('status-detail').textContent=error.message;$('dot').classList.remove('connected')}
  }
  async function predictMatch(){
    const playerA=$('player-a').value.trim(),playerB=$('player-b').value.trim(),avgA=Number($('avg-a').value),avgB=Number($('avg-b').value),setsToWin=Number($('sets-to-win').value);$('favorite').textContent='계산 중';
    try{const response=await fetch('/api/v1/match-probability',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_a:playerA,player_b:playerB,avg_a:avgA,avg_b:avgB,sets_to_win:setsToWin})});const data=await response.json();if(!response.ok)throw new Error(data.detail||data.error);const pa=data.playerA.winProbability*100,pb=data.playerB.winProbability*100,sa=data.playerA.setProbability*100,sb=data.playerB.setProbability*100;$('name-a').textContent=data.playerA.name;$('name-b').textContent=data.playerB.name;$('avatar-a').textContent=data.playerA.name[0];$('avatar-b').textContent=data.playerB.name[0];$('win-a').textContent=`${pa.toFixed(1)}%`;$('win-b').textContent=`${pb.toFixed(1)}%`;$('set-a').textContent=`세트 승률 ${sa.toFixed(1)}%`;$('set-b').textContent=`세트 승률 ${sb.toFixed(1)}%`;$('odds-a').style.width=`${pa}%`;$('odds-b').style.width=`${pb}%`;$('odds-a').textContent=`${pa.toFixed(0)}%`;$('odds-b').textContent=`${pb.toFixed(0)}%`;$('face-a').classList.toggle('favorite',pa>pb);$('face-b').classList.toggle('favorite',pb>pa);const winner=data.likelyScore.winner==='a'?data.playerA.name:data.playerB.name;$('favorite').textContent=Math.abs(pa-pb)<1?'팽팽한 승부':`${winner} 우세`;$('likely-score').textContent=`가장 가능성 높은 스코어 · ${winner} ${data.likelyScore.winnerSets}-${data.likelyScore.loserSets}`;$('match-model').textContent=data.modelVersion}catch(error){$('favorite').textContent=error.message;$('likely-score').textContent='입력값을 확인하세요'}
  }
  $('match-predict').onclick=predictMatch;
  function selectCue(value){shooter=value;formationRevision++;renderBalls();predict();if(liveRunning)fetch('/api/v1/youtube/live/shooter',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shooter})})}
  $('connect').onclick=()=>{const id=videoId($('youtube-url').value);if(!id){$('status').textContent='YouTube URL 확인 필요';return}if(!ytApiReady||!window.YT){$('status').textContent='YouTube 플레이어 준비 중';$('status-detail').textContent='잠시 후 다시 눌러주세요';return}$('placeholder').classList.add('hidden');if(ytPlayer&&typeof ytPlayer.loadVideoById==='function'){ytPlayer.loadVideoById(id);syncLiveTo(0);return}ytPlayer=new YT.Player('player',{videoId:id,playerVars:{autoplay:1,mute:1,playsinline:1},events:{onReady:event=>{event.target.mute();$('position-range').disabled=false;$('seek').disabled=false;$('analyze').disabled=false;syncPlayerTime();syncLiveTo(event.target.getCurrentTime()||0)},onStateChange:syncPlayerTime}})};
  $('position-range').onpointerdown=()=>{isScrubbing=true};
  $('position-range').oninput=event=>{$('current-time').textContent=formatTime(event.target.value)};
  $('position-range').onchange=event=>{isScrubbing=false;const seconds=Number(event.target.value);if(ytPlayer)ytPlayer.seekTo(seconds,true);$('position-text').value=formatTime(seconds);syncLiveTo(seconds)};
  $('seek').onclick=()=>{const seconds=parseTime($('position-text').value);if(seconds===null){$('status').textContent='영상 위치 형식 확인 필요';return}$('position-range').value=seconds;$('current-time').textContent=formatTime(seconds);if(ytPlayer)ytPlayer.seekTo(seconds,true);syncLiveTo(seconds)};
  $('live-toggle').onclick=()=>liveRunning?stopLive():startLive(Number($('position-range').value));
  $('analyze').onclick=async()=>{const url=$('youtube-url').value.trim();const seconds=Number($('position-range').value);if(!videoId(url)){$('status').textContent='YouTube URL 확인 필요';return}$('analyze').disabled=true;$('analysis-state').textContent='앞 구간 검출 중';$('status').textContent='리플레이 직전 공 분석 중';$('status-detail').textContent=`${formatTime(seconds)} 이전 12초 탐색`;try{const response=await fetch('/api/v1/youtube/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,timestamp_seconds:seconds,lookback_seconds:12,shooter,position_error_mm:25})});const data=await response.json();if(!response.ok)throw new Error(data.detail||data.error);detectionVersion=data.version;balls=data.before;formationRevision++;renderBalls();applyPrediction(data.prediction);const a=data.analysis;$('analysis-state').textContent=`${formatTime(a.detectedAtSeconds)} 배치`;$('status-detail').textContent=`선택 ${formatTime(a.selectedSeconds)} · 검출 ${formatTime(a.detectedAtSeconds)} · 신뢰도 ${(a.detectionConfidence*100).toFixed(0)}%`}catch(error){$('analysis-state').textContent='검출 실패';$('status').textContent='공 배치를 찾지 못함';$('status-detail').textContent=error.message}finally{$('analyze').disabled=false}};
  $('sample').onclick=()=>{sampleIndex=(sampleIndex+1)%samples.length;balls=samples[sampleIndex];formationRevision++;renderBalls();predict()};
  $('white').onclick=()=>selectCue('white');$('yellow').onclick=()=>selectCue('yellow');
  window.cuecastUpdateFormation=value=>{balls=value;formationRevision++;renderBalls();predict()};
  async function pollDetections(){try{const d=await fetch('/api/v1/detection/latest').then(r=>r.json());if(d.version>detectionVersion&&d.before){detectionVersion=d.version;balls=d.before;shooter=d.shooter||shooter;formationRevision++;renderBalls();if(d.prediction)applyPrediction(d.prediction);else predict();if(d.analysis)$('analysis-state').textContent=`${d.analysis.mode==='live'?'자동 · ':''}${formatTime(d.analysis.detectedAtSeconds)} 배치`}}catch{}setTimeout(pollDetections,750)}
  async function pollLive(){try{const s=await fetch('/api/v1/youtube/live/status').then(r=>r.json());liveRunning=Boolean(s.running);if(s.state==='running'){$('live-toggle').textContent='자동 분석 중지';$('analysis-state').textContent=s.lastLayoutSeconds!=null?`자동 · ${formatTime(s.lastLayoutSeconds)} 배치`:`자동 분석 중 · ${formatTime(s.positionSeconds)}`}else if(s.state==='connecting'){$('live-toggle').textContent='자동 연결 중'}else if(s.state==='error'){$('live-toggle').textContent='자동 분석 재시작';$('analysis-state').textContent='자동 분석 오류';$('status-detail').textContent=s.lastError||''}else if(!liveRunning&&s.state!=='idle'){$('live-toggle').textContent='자동 분석 시작'}}catch{}setTimeout(pollLive,1000)}
  setInterval(syncPlayerTime,500);renderBalls();predict();pollDetections();pollLive();
</script>
