<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CueCast Symmetric Hybrid v2</title>
  <style>
    :root{color-scheme:light dark;--bg:#f2f5f7;--panel:#fff;--text:#152029;--muted:#65727b;--line:#d7dfe4;--felt:#176b50;--cue:#47a8ff;--o1:#ffb347;--o2:#ff6262;--accent:#287be0;--shadow:0 14px 35px rgba(18,35,46,.12)}
    @media(prefers-color-scheme:dark){:root{--bg:#101519;--panel:#182128;--text:#edf4f7;--muted:#a9b5bd;--line:#34424b;--felt:#125a43;--shadow:0 14px 35px rgba(0,0,0,.3)}}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Pretendard,system-ui,sans-serif}button,select,input{font:inherit}main{width:min(1200px,calc(100% - 28px));margin:24px auto 44px}header{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:16px}h1{margin:0;font-size:clamp(24px,3vw,36px);letter-spacing:-.04em}header p{margin:6px 0 0;color:var(--muted)}.online{color:var(--muted);white-space:nowrap}.online i{display:inline-block;width:9px;height:9px;border-radius:50%;background:#d44;margin-right:7px}.online.ok i{background:#3fbd78}.layout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:17px;box-shadow:var(--shadow)}.board-panel{padding:15px}.tools{display:flex;flex-wrap:wrap;gap:9px;align-items:end;margin-bottom:13px}.field{display:grid;gap:5px;color:var(--muted);font-size:13px}.tools select,.tools button,input{min-height:38px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--text);padding:7px 10px}.roles{display:flex;gap:5px}.roles button{font-weight:700;min-width:52px;cursor:pointer}.roles button.active{background:var(--accent);border-color:var(--accent);color:#fff}canvas{display:block;width:100%;aspect-ratio:2/1;border-radius:12px;touch-action:none;cursor:crosshair}.hint{margin-top:10px;color:var(--muted);font-size:13px}.side{display:grid;gap:13px;align-content:start}.result,.details,.coords{padding:17px}.eyebrow{font-size:13px;color:var(--muted)}.prob{font-size:48px;line-height:1;margin:5px 0 12px;font-weight:750;letter-spacing:-.06em}.meter{height:9px;border-radius:999px;background:var(--line);overflow:hidden}.meter div{height:100%;width:0;background:var(--accent);transition:width .2s}.summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.summary strong{display:block;margin-top:3px}.details h2,.coords h2{font-size:15px;margin:0 0 12px}.kv{display:grid;grid-template-columns:1fr auto;gap:8px 12px;font-size:13px}.kv span{color:var(--muted)}.bars{display:grid;gap:9px;margin-top:14px}.bar-head{display:flex;justify-content:space-between;font-size:13px}.bar-track{height:6px;background:var(--line);border-radius:99px;overflow:hidden}.bar-track div{height:100%;background:var(--accent)}.coord{display:grid;grid-template-columns:38px 1fr 1fr;gap:7px;align-items:end;margin-top:8px}.coord b{padding-bottom:10px}.coord input{width:100%}.note{margin-top:15px;padding:12px 14px;border-left:3px solid var(--accent);color:var(--muted);font-size:13px;line-height:1.5}.error{color:#e45a5a}@media(max-width:860px){.layout{grid-template-columns:1fr}.side{grid-template-columns:1fr 1fr}.coords{grid-column:1/-1}}@media(max-width:560px){header{align-items:start;flex-direction:column}.side{grid-template-columns:1fr}.coords{grid-column:auto}.tools>.field{flex:1 1 130px}}
  </style>
</head>
<body>
<main>
  <header>
    <div><h1>Symmetric Hybrid v2</h1><p>8방향 대칭 CatBoost · Symmetric Neighbor · Canonical Adaptive Grid</p></div>
    <div class="online" id="online"><i></i><span>엔진 연결 중</span></div>
  </header>
  <div class="layout">
    <section class="panel board-panel">
      <div class="tools">
        <div class="field"><span>배치할 공</span><div class="roles" id="roles"><button class="active" data-role="cue">C</button><button data-role="object1">O1</button><button data-role="object2">O2</button></div></div>
        <label class="field">수구 색상<select id="shooter"><option value="yellow">노란 수구</option><option value="white">흰 수구</option></select></label>
        <label class="field">Grid 표시<select id="grid"><option value="adaptive">실제 Adaptive</option><option value="0">Level 0 · 4×2</option><option value="1">Level 1 · 8×4</option><option value="2">Level 2 · 16×8</option></select></label>
        <label class="field">과거 위치<select id="history"><option value="all">전체 1,509점</option><option value="success">성공만</option><option value="failure">실패만</option><option value="none">숨기기</option></select></label>
        <button id="example">최고 분할 예시</button>
      </div>
      <canvas id="board" aria-label="세 공을 자유롭게 배치하는 버츄얼 당구대"></canvas>
      <div class="hint">C/O1/O2를 선택해 빈 곳을 클릭하거나 공을 직접 드래그하세요. 색 테두리는 현재 Canonical Grid 셀입니다.</div>
    </section>
    <aside class="side">
      <section class="panel result" aria-live="polite">
        <div class="eyebrow">최종 성공 확률</div><div class="prob" id="prob">—</div><div class="meter"><div id="meter"></div></div>
        <div class="summary"><div><span class="eyebrow">신뢰도</span><strong id="confidence">—</strong></div><div><span class="eyebrow">좌표 불확실성</span><strong id="uncertainty">—</strong></div></div>
      </section>
      <section class="panel details">
        <h2>Hybrid 구성</h2>
        <div class="kv"><span>Adaptive Level</span><strong id="level">—</strong><span>Canonical key</span><strong id="key">—</strong><span>Grid 표본</span><strong id="grid-samples">—</strong><span>Neighbor</span><strong id="neighbors">—</strong><span>대칭 추론</span><strong id="symmetry">8회</strong><span>활성 분할</span><strong id="splits">—</strong></div>
        <div class="bars" id="components"></div>
      </section>
      <section class="panel coords"><h2>정규화 좌표</h2><div id="coord-host"></div></section>
    </aside>
  </div>
  <div class="note" id="note">검증 정보 로딩 중</div>
</main>
<script>
(()=>{
  const canvas=document.getElementById('board'),ctx=canvas.getContext('2d'),roles=['cue','object1','object2'],labels={cue:'C',object1:'O1',object2:'O2'},colors={cue:'--cue',object1:'--o1',object2:'--o2'},dims=[[4,2],[8,4],[16,8]];
  const state={active:'cue',drag:null,formation:{cue:[.24,.52],object1:[.54,.30],object2:[.73,.70]},data:null,prediction:null,request:0};
  const css=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim(),clamp=v=>Math.max(0,Math.min(1,v));
  function cell(p,l){const[c,r]=dims[l],col=Math.min(c-1,Math.floor(p[0]*c)),row=Math.min(r-1,Math.floor(p[1]*r));return{col,row,id:row*c+col}}
  function setupInputs(){const h=document.getElementById('coord-host');roles.forEach(role=>{const d=document.createElement('div');d.className='coord';d.innerHTML=`<b>${labels[role]}</b><label class="field">X<input type="number" min="0" max="1" step=".001" data-role="${role}" data-axis="0"></label><label class="field">Y<input type="number" min="0" max="1" step=".001" data-role="${role}" data-axis="1"></label>`;h.append(d)});h.addEventListener('change',e=>{const i=e.target.closest('input');if(!i)return;state.formation[i.dataset.role][+i.dataset.axis]=clamp(+i.value);sync();draw();predict()});sync()}
  function sync(){document.querySelectorAll('#coord-host input').forEach(i=>i.value=state.formation[i.dataset.role][+i.dataset.axis].toFixed(3))}
  function resize(){const d=window.devicePixelRatio||1,w=canvas.clientWidth,h=w/2;canvas.width=w*d;canvas.height=h*d;ctx.setTransform(d,0,0,d,0,0);draw()}
  function gridLines(level,alpha=.8){const w=canvas.clientWidth,h=w/2,[cols,rows]=dims[level];ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle='rgba(255,255,255,.42)';ctx.lineWidth=1;for(let x=1;x<cols;x++){ctx.beginPath();ctx.moveTo(x*w/cols,0);ctx.lineTo(x*w/cols,h);ctx.stroke()}for(let y=1;y<rows;y++){ctx.beginPath();ctx.moveTo(0,y*h/rows);ctx.lineTo(w,y*h/rows);ctx.stroke()}ctx.restore()}
  function history(){const mode=document.getElementById('history').value;if(!state.data||mode==='none')return;const w=canvas.clientWidth,h=w/2;state.data.shots.forEach(s=>{if(mode==='success'&&!s.success||mode==='failure'&&s.success)return;roles.forEach(role=>{const p=s[role];ctx.save();ctx.globalAlpha=s.success?.2:.32;ctx.fillStyle=s.success?css(colors[role]):css('--panel');ctx.strokeStyle=css(colors[role]);ctx.beginPath();ctx.arc(p[0]*w,p[1]*h,2.1,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore()})})}
  function adaptiveLines(){if(!state.prediction)return;const selected=+state.prediction.components.gridLevel,w=canvas.clientWidth,h=w/2;for(let l=1;l<=selected;l++)roles.forEach(role=>{const p=cell(state.formation[role],l-1),[cols,rows]=dims[l-1],x=p.col*w/cols,y=p.row*h/rows,cw=w/cols,ch=h/rows;ctx.save();ctx.strokeStyle=css(colors[role]);ctx.lineWidth=2;ctx.setLineDash(l===1?[5,4]:[2,3]);ctx.beginPath();ctx.moveTo(x+cw/2,y);ctx.lineTo(x+cw/2,y+ch);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y+ch/2);ctx.lineTo(x+cw,y+ch/2);ctx.stroke();ctx.restore()})}
  function activeCells(){const w=canvas.clientWidth,h=w/2,mode=document.getElementById('grid').value,l=mode==='adaptive'?(state.prediction?+state.prediction.components.gridLevel:0):+mode,[cols,rows]=dims[l];roles.forEach(role=>{const p=cell(state.formation[role],l);ctx.save();ctx.strokeStyle=css(colors[role]);ctx.lineWidth=3;ctx.strokeRect(p.col*w/cols+2,p.row*h/rows+2,w/cols-4,h/rows-4);ctx.restore()})}
  function balls(){const w=canvas.clientWidth,h=w/2;roles.forEach(role=>{const p=state.formation[role];ctx.save();ctx.fillStyle=css('--panel');ctx.strokeStyle=css(colors[role]);ctx.lineWidth=4;ctx.beginPath();ctx.arc(p[0]*w,p[1]*h,11,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=css('--text');ctx.font='700 11px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(labels[role],p[0]*w,p[1]*h);ctx.restore()})}
  function draw(){const w=canvas.clientWidth,h=w/2;if(!w)return;ctx.clearRect(0,0,w,h);ctx.fillStyle=css('--felt');ctx.fillRect(0,0,w,h);history();const mode=document.getElementById('grid').value;gridLines(mode==='adaptive'?0:+mode,mode==='2'?.5:.85);if(mode==='adaptive')adaptiveLines();activeCells();balls()}
  function point(e){const r=canvas.getBoundingClientRect();return[clamp((e.clientX-r.left)/r.width),clamp((e.clientY-r.top)/r.height)]}
  function nearest(p){const w=canvas.clientWidth,h=w/2;let found=null,best=18;roles.forEach(role=>{const q=state.formation[role],d=Math.hypot((q[0]-p[0])*w,(q[1]-p[1])*h);if(d<best){best=d;found=role}});return found}
  function bars(c){const rows=[['대칭 CatBoost',c.modelProbability,c.weights.model],['Symmetric Neighbor',c.neighborProbability,c.weights.neighbor],['Canonical Grid',c.gridProbability,c.weights.grid]];document.getElementById('components').innerHTML=rows.map(([n,p,w])=>`<div><div class="bar-head"><span>${n}</span><strong>${p==null?'표본 없음':(p*100).toFixed(1)+'%'} · 가중치 ${(w*100).toFixed(0)}%</strong></div><div class="bar-track"><div style="width:${p==null?0:p*100}%"></div></div></div>`).join('')}
  function render(){const r=state.prediction,c=r.components,p=r.successProbability*100,names={low:'낮음',medium:'보통',high:'높음'};document.getElementById('prob').textContent=p.toFixed(1)+'%';document.getElementById('meter').style.width=p+'%';document.getElementById('confidence').textContent=`${names[r.confidence.level]} · ${(r.confidence.score*100).toFixed(0)}`;document.getElementById('uncertainty').textContent=`±${(r.uncertainty.standardDeviation*100).toFixed(1)}%p`;document.getElementById('level').textContent='Level '+c.gridLevel;document.getElementById('key').textContent='('+c.gridStateKey.join(', ')+')';document.getElementById('grid-samples').textContent=c.gridSamples+'건';document.getElementById('neighbors').textContent=`${c.neighborRawSamples}건 · N효과 ${c.neighborEffectiveSamples.toFixed(1)}`;bars(c)}
  async function predict(){const id=++state.request;document.getElementById('prob').textContent='…';try{const res=await fetch('/api/v1/shot-probability',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shooter:document.getElementById('shooter').value,formation:state.formation,position_error_mm:25})}),r=await res.json();if(!res.ok)throw Error(r.detail||'예측 실패');if(id!==state.request)return;state.prediction=r;render();draw()}catch(e){document.getElementById('online').querySelector('span').textContent=e.message;document.getElementById('online').classList.add('error')}}
  async function init(){setupInputs();const[hr,dr]=await Promise.all([fetch('/api/v1/health'),fetch('/api/v1/data')]);if(!hr.ok||!dr.ok)throw Error('초기화 실패');const h=await hr.json();state.data=await dr.json();document.getElementById('online').classList.add('ok');document.getElementById('online').querySelector('span').textContent='v2 엔진 연결됨';const l1=h.grid.splitWorthyParents[0].length,l2=h.grid.splitWorthyParents[1].length;document.getElementById('splits').textContent=`L1 ${l1}개 · L2 ${l2}개`;document.getElementById('note').textContent=`원본 ${h.records}타구를 한 번씩만 집계합니다. 대칭 8개는 모델 추론과 거리·canonical key 계산에만 사용합니다. 경기 단위 홀드아웃 Log Loss ${h.validation.logLoss.toFixed(3)} · Brier ${h.validation.brierScore.toFixed(3)} · 정확도 ${(h.validation.accuracy*100).toFixed(1)}%.`;document.getElementById('example').disabled=!state.data.splitExamples.length;draw();await predict()}
  document.getElementById('roles').addEventListener('click',e=>{const b=e.target.closest('[data-role]');if(!b)return;state.active=b.dataset.role;document.querySelectorAll('#roles button').forEach(x=>x.classList.toggle('active',x===b))});canvas.addEventListener('pointerdown',e=>{const p=point(e);state.drag=nearest(p);if(state.drag)canvas.setPointerCapture(e.pointerId);else{state.formation[state.active]=p;sync();draw();predict()}});canvas.addEventListener('pointermove',e=>{if(!state.drag)return;state.formation[state.drag]=point(e);sync();draw()});canvas.addEventListener('pointerup',()=>{if(state.drag){state.drag=null;predict()}});canvas.addEventListener('pointercancel',()=>state.drag=null);document.getElementById('grid').addEventListener('change',draw);document.getElementById('history').addEventListener('change',draw);document.getElementById('shooter').addEventListener('change',predict);document.getElementById('example').addEventListener('click',()=>{const e=state.data?.splitExamples?.[0];if(!e)return;state.formation={cue:[...e.formation.cue],object1:[...e.formation.object1],object2:[...e.formation.object2]};document.getElementById('shooter').value=e.shooter;document.getElementById('grid').value='adaptive';sync();draw();predict()});window.addEventListener('resize',resize);resize();init().catch(e=>{document.getElementById('online').querySelector('span').textContent=e.message})
})();
</script>
</body>
</html>
