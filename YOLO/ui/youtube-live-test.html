.form-switch .form-check-input:checked {

  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);

.form-range::-moz-range-track {

  height: 20px;

&lt;style&gt;

&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&#x27;cuecast-youtube-ui&#x27;);
    const ns = &#x27;http://www.w3.org/2000/svg&#x27;;
    const samples = [
      { balls: { white: [0.5583, 0.9381], yellow: [0.2336, 0.7072], red: [0.9643, 0.3434] }, p: { white: 0.2034325820, yellow: 0.6485556550 } },
      { balls: { white: [0.9052, 0.2854], yellow: [0.5463, 0.9336], red: [0.9640, 0.3427] }, p: { white: 0.6427839870, yellow: 0.1681262313 } },
      { balls: { white: [0.9057, 0.2848], yellow: [0.9244, 0.3762], red: [0.5551, 0.8595] }, p: { white: 0.1338492312, yellow: 0.2291431543 } }
    ];
    let sampleIndex = 0;
    let cue = &#x27;white&#x27;;

    const create = (name, attrs) =&gt; {
      const element = document.createElementNS(ns, name);
      Object.entries(attrs).forEach(([key, value]) =&gt; element.setAttribute(key, String(value)));
      return element;
    };
    const extractVideoId = value =&gt; {
      const text = value.trim();
      if (/^[A-Za-z0-9_-]{11}$/.test(text)) return text;
      try {
        const url = new URL(text);
        if (url.hostname.includes(&#x27;youtu.be&#x27;)) return url.pathname.split(&#x27;/&#x27;).filter(Boolean)[0] || null;
        if (url.searchParams.get(&#x27;v&#x27;)) return url.searchParams.get(&#x27;v&#x27;);
        const parts = url.pathname.split(&#x27;/&#x27;).filter(Boolean);
        const marker = parts.findIndex(part =&gt; [&#x27;embed&#x27;, &#x27;shorts&#x27;, &#x27;live&#x27;].includes(part));
        return marker &gt;= 0 ? parts[marker + 1] || null : null;
      } catch (_error) {
        return null;
      }
    };
    const tablePoint = ([x, y]) =&gt; [37 + x * 566, 37 + y * 286];
    const videoPoint = ([x, y]) =&gt; [70 + x * 500, 45 + y * 270];

    function renderFormation() {
      const sample = samples[sampleIndex];
      const videoGroup = root.querySelector(&#x27;#cyl-video-balls&#x27;);
      const virtualGroup = root.querySelector(&#x27;#cyl-virtual-balls&#x27;);
      videoGroup.replaceChildren();
      virtualGroup.replaceChildren();
      [&#x27;white&#x27;, &#x27;yellow&#x27;, &#x27;red&#x27;].forEach(color =&gt; {
        const [vx, vy] = videoPoint(sample.balls[color]);
        videoGroup.appendChild(create(&#x27;rect&#x27;, { x: vx - 16, y: vy - 16, width: 32, height: 32, rx: 3, class: `cyl-box cyl-stroke-${color}` }));
        videoGroup.appendChild(create(&#x27;circle&#x27;, { cx: vx, cy: vy, r: 7, class: `cyl-ball cyl-${color}` }));
        videoGroup.appendChild(create(&#x27;rect&#x27;, { x: vx - 16, y: vy - 36, width: 85, height: 18, rx: 3, class: `cyl-label-bg cyl-fill-${color}` }));
        const detectedLabel = create(&#x27;text&#x27;, { x: vx - 11, y: vy - 23, class: &#x27;cyl-label text-small&#x27; });
        detectedLabel.textContent = `${color[0].toUpperCase()} ${sample.balls[color][0].toFixed(2)},${sample.balls[color][1].toFixed(2)}`;
        videoGroup.appendChild(detectedLabel);

        const [tx, ty] = tablePoint(sample.balls[color]);
        if (color === cue) virtualGroup.appendChild(create(&#x27;circle&#x27;, { cx: tx, cy: ty, r: 16, class: &#x27;cyl-cue-ring&#x27; }));
        virtualGroup.appendChild(create(&#x27;circle&#x27;, { cx: tx, cy: ty, r: 10, class: `cyl-ball cyl-${color}` }));
        const label = create(&#x27;text&#x27;, { x: tx + 15, y: ty - 12, class: &#x27;cyl-ball-label text-small&#x27; });
        label.textContent = color === cue ? `${color} · CUE` : color;
        virtualGroup.appendChild(label);
      });
      root.querySelector(&#x27;#cyl-coordinates&#x27;).textContent = `W (${sample.balls.white[0].toFixed(2)}, ${sample.balls.white[1].toFixed(2)}) · Y (${sample.balls.yellow[0].toFixed(2)}, ${sample.balls.yellow[1].toFixed(2)}) · R (${sample.balls.red[0].toFixed(2)}, ${sample.balls.red[1].toFixed(2)})`;
    }

    function renderProbability() {
      const probability = samples[sampleIndex].p[cue] * 100;
      const value = `${probability.toFixed(1)}%`;
      const cueName = cue === &#x27;white&#x27; ? &#x27;흰 공&#x27; : &#x27;노란 공&#x27;;
      root.querySelector(&#x27;#cyl-probability&#x27;).textContent = value;
      root.querySelector(&#x27;#cyl-difficulty&#x27;).textContent = (100 - probability).toFixed(1);
      root.querySelector(&#x27;#cyl-role-label&#x27;).textContent = `${cueName} 수구`;
      root.querySelector(&#x27;#cyl-progress-label&#x27;).textContent = `${cueName} 수구 성공 가능성`;
      root.querySelector(&#x27;#cyl-progress-value&#x27;).textContent = value;
      root.querySelector(&#x27;#cyl-bar&#x27;).style.width = `${probability}%`;
      root.querySelector(&#x27;#cyl-progress&#x27;).setAttribute(&#x27;aria-valuenow&#x27;, String(Math.round(probability)));
    }

    function selectCue(nextCue) {
      cue = nextCue;
      const white = root.querySelector(&#x27;#cyl-white&#x27;);
      const yellow = root.querySelector(&#x27;#cyl-yellow&#x27;);
      white.classList.toggle(&#x27;btn-primary&#x27;, cue === &#x27;white&#x27;);
      yellow.classList.toggle(&#x27;btn-primary&#x27;, cue === &#x27;yellow&#x27;);
      white.setAttribute(&#x27;aria-pressed&#x27;, String(cue === &#x27;white&#x27;));
      yellow.setAttribute(&#x27;aria-pressed&#x27;, String(cue === &#x27;yellow&#x27;));
      renderFormation();
      renderProbability();
    }

    root.querySelector(&#x27;#cyl-connect&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
      const id = extractVideoId(root.querySelector(&#x27;#cyl-youtube-url&#x27;).value);
      const statusDot = root.querySelector(&#x27;#cyl-status-dot&#x27;);
      const status = root.querySelector(&#x27;#cyl-status-text&#x27;);
      const detail = root.querySelector(&#x27;#cyl-status-detail&#x27;);
      if (!id) {
        statusDot.classList.remove(&#x27;is-connected&#x27;);
        status.textContent = &#x27;URL 형식 확인 필요&#x27;;
        detail.textContent = &#x27;일반 영상, youtu.be, Shorts, Live URL을 지원합니다.&#x27;;
        return;
      }
      statusDot.classList.add(&#x27;is-connected&#x27;);
      status.textContent = &#x27;영상 연결됨&#x27;;
      if (window.self === window.top) {
        root.querySelector(&#x27;#cyl-player&#x27;).src = `https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}?autoplay=1&amp;mute=1&amp;playsinline=1`;
        root.querySelector(&#x27;#cyl-player-placeholder&#x27;).classList.add(&#x27;is-hidden&#x27;);
        detail.textContent = &#x27;백엔드 검출 좌표 수신 대기&#x27;;
      } else {
        root.querySelector(&#x27;#cyl-placeholder-text&#x27;).textContent = `연결됨 · ${id}`;
        detail.textContent = &#x27;이 미리보기에서는 외부 영상이 차단되며 독립 실행 화면에서 재생됩니다.&#x27;;
      }
    });
    root.querySelector(&#x27;#cyl-sample&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
      sampleIndex = (sampleIndex + 1) % samples.length;
      root.querySelector(&#x27;#cyl-status-dot&#x27;).classList.add(&#x27;is-connected&#x27;);
      root.querySelector(&#x27;#cyl-status-text&#x27;).textContent = `샘플 검출 ${sampleIndex + 1}/3`;
      root.querySelector(&#x27;#cyl-status-detail&#x27;).textContent = &#x27;정지 포메이션 → 하이브리드 확률 엔진 계산 완료&#x27;;
      renderFormation();
      renderProbability();
    });
    root.querySelector(&#x27;#cyl-white&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; selectCue(&#x27;white&#x27;));
    root.querySelector(&#x27;#cyl-yellow&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; selectCue(&#x27;yellow&#x27;));

    renderFormation();
    renderProbability();
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

&lt;/script&gt;
